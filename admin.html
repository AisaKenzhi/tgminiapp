<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка Магазина</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .form { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
        .product-item { background: white; padding: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; }
        .del-btn { background: #ef4444; width: auto; padding: 5px 10px; }
    </style>
</head>
<body>
    <h2>Добавить товар</h2>
    <div class="form">
        <input type="text" id="name" placeholder="Название товара">
        <input type="number" id="price" placeholder="Цена (грн)">
        <select id="category">
            <option value="baby">👶 Малышам</option>
            <option value="girls">👧 Девочкам</option>
            <option value="boys">👦 Мальчикам</option>
        </select>
        <input type="text" id="image" placeholder="Ссылка на фото (URL)">
        <textarea id="desc" placeholder="Описание"></textarea>
        <button onclick="addProduct()">Добавить в магазин</button>
    </div>

    <h2>Список товаров</h2>
    <div id="list"></div>

    <script>
        // СЮДА ТОЖЕ ВСТАВЬ СВОЙ NGROK!
        const API_URL = "https://unpendant-meteorically-felipe.ngrok-free.dev";

        async function load() {
            const res = await fetch(`${API_URL}/api/products`);
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach(p => {
                list.innerHTML += `<div class="product-item">
                    <span>${p.name} - ${p.price} ₴</span>
                    <button class="del-btn" onclick="del(${p.id})">Удалить</button>
                </div>`;
            });
        }

        async function addProduct() {
            const item = {
                name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value),
                category: document.getElementById('category').value,
                image: document.getElementById('image').value,
                description: document.getElementById('desc').value
            };
            await fetch(`${API_URL}/api/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(item)
            });
            location.reload();
        }

        async function del(id) {
            await fetch(`${API_URL}/api/products/${id}`, { method: 'DELETE' });
            load();
        }
        load();
    </script>
</body>

</html>
