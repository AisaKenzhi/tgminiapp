<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vesto Bayer App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F4F6F9; --card: #FFFFFF; --accent: #3A6DFF; --text-dark: #1E2335; --text-gray: #8A92A6; --radius-xl: 24px; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text-dark); margin: 0; padding: 0; padding-bottom: 90px; }
        .page-title { font-size: 24px; font-weight: 800; padding: 20px 20px 10px; }
        .view { display: none; padding: 0 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Категории */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; }
        .categories::-webkit-scrollbar { display: none; }
        .chip { background: var(--card); padding: 8px 16px; border-radius: 50px; font-size: 13px; font-weight: 600; color: var(--text-gray); cursor: pointer; border: 2px solid transparent; white-space: nowrap; }
        .chip.active { background: rgba(58, 109, 255, 0.1); color: var(--accent); border-color: var(--accent); }

        /* Карточка товара */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background: var(--card); border-radius: var(--radius-xl); padding: 10px; position: relative; text-align: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .product-img { width: 100%; height: 140px; border-radius: 16px; object-fit: cover; background: #f0f0f0; }
        .badge { position: absolute; top: 10px; left: 10px; background: #FF4B4B; color: white; padding: 4px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; z-index: 2; }
        .product-title { font-size: 13px; font-weight: 700; margin: 8px 0 4px; line-height: 1.2; }
        .product-price { color: var(--accent); font-weight: 800; font-size: 16px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 16px; font-family: inherit; font-weight: 700; cursor: pointer; font-size: 15px;}
        .btn-primary { background: var(--accent); color: white; margin-top: 10px; box-shadow: 0 8px 20px rgba(58, 109, 255, 0.3); }

        .heart { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .heart.active { color: #FF4B4B; }

        /* Профиль */
        .profile-header { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 20px; border-radius: var(--radius-xl); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);}
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: #ddd; object-fit: cover; }

        /* Модалка Товара (Детали) */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding-bottom: 90px; }
        .modal-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; width: 100%; }
        .modal-gallery img { width: 100%; height: 350px; object-fit: cover; scroll-snap-align: start; flex: 0 0 100%; }
        .modal-close { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; font-size: 20px; cursor: pointer; }

        /* Нижнее меню */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); display: flex; justify-content: space-around; padding: 15px 10px 20px; border-radius: 30px 30px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { text-align: center; color: var(--text-gray); font-size: 11px; font-weight: 600; width: 60px;}
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="view-store" class="view active">
        <h1 class="page-title">Каталог</h1>
        <div class="categories">
            <div class="chip active" onclick="filterCat('Все', this)">Все</div>
            <div class="chip" onclick="filterCat('Новинки', this)">⭐️ Новинки</div>
            <div class="chip" onclick="filterCat('Топ продаж', this)">🔥 Топ продаж</div>
            <div class="chip" onclick="filterCat('Малыши', this)">👶 Малыши</div>
        </div>
        <div class="grid" id="catalog-grid"></div>
    </div>

    <div id="view-profile" class="view">
        <h1 class="page-title">Мой профиль</h1>
        <div class="profile-header">
            <img src="${tg.initDataUnsafe.user?.photo_url || 'https://via.placeholder.com/60'}" class="avatar">
            <div>
                <div style="font-size: 18px; font-weight: 800;">@<span id="tg-user">username</span></div>
                <div style="font-size: 13px; color: var(--accent); font-weight: 700;">Статус: <span id="client-status">Новичок</span></div>
            </div>
        </div>
        <div class="profile-header">
            <div>
                <div style="color: var(--text-gray); font-size: 12px;">Сумма покупок</div>
                <div style="font-size: 20px; font-weight: 800;" id="total-spent">0 ₴</div>
            </div>
        </div>
    </div>

    <div id="view-wishlist" class="view">
        <h1 class="page-title">Избранное ❤️</h1>
        <button class="btn btn-primary" style="margin-bottom: 15px; box-shadow: none;" onclick="shareWishlist()">📸 Поделиться в Сторис</button>
        <div class="grid" id="wishlist-grid"></div>
    </div>

    <div id="view-cart" class="view">
        <h1 class="page-title">Корзина 🛒</h1>
        <div id="cart-list"></div>
        <div id="cart-total-box" style="display:none; background: var(--card); padding: 20px; border-radius: 24px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
            <input type="text" id="promo-input" placeholder="Промокод (если есть)" style="width:100%; box-sizing:border-box; padding:12px; border-radius:12px; border:1px solid #eee; margin-bottom:10px; font-family:inherit;">
            <button class="btn" style="background:var(--bg); color:var(--text-dark); margin-bottom: 15px;" onclick="applyPromo()">Применить код</button>
            <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 20px; margin-bottom: 10px;">
                <span>Итого:</span> <span id="cart-total-price">0 ₴</span>
            </div>
            <button class="btn btn-primary" onclick="sendOrder()">Оформить заказ</button>
        </div>
    </div>

    <div id="product-modal" class="modal">
        <div class="modal-close" onclick="closeModal()">×</div>
        <div class="modal-gallery" id="modal-gallery"></div>
        <div style="padding: 20px; background: var(--card); border-radius: 30px 30px 0 0; margin-top: -20px; position: relative; z-index: 5;">
            <div id="modal-badge" class="badge" style="position:relative; display:inline-block; margin-bottom:10px; top:0; left:0;"></div>
            <h2 id="modal-title" style="margin-bottom: 5px; font-size: 22px;"></h2>
            <div id="modal-price" style="color: var(--accent); font-size: 24px; font-weight: 800; margin-bottom: 15px;"></div>
            <div style="color: var(--text-dark); font-size: 14px; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap;" id="modal-desc"></div>
            
            <button class="btn btn-primary" id="modal-add-btn">Добавить в корзину</button>
            <button class="btn" style="background: var(--bg); color: var(--text-dark); margin-top: 10px;" id="modal-share-btn">🔗 Поделиться товаром</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('store', this)"><div style="font-size: 20px; margin-bottom: 3px;">🏠</div>Магазин</div>
        <div class="nav-item" onclick="switchTab('profile', this)"><div style="font-size: 20px; margin-bottom: 3px;">👤</div>Профиль</div>
        <div class="nav-item" onclick="switchTab('wishlist', this)"><div style="font-size: 20px; margin-bottom: 3px;">❤️</div>Избранное</div>
        <div class="nav-item" onclick="switchTab('cart', this)"><div style="font-size: 20px; margin-bottom: 3px;">🛒</div>Корзина</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    // 🔴 ВАЖНО: ВСТАВЬ СВОЙ NGROK НИЖЕ 🔴
    const API_URL = "https://ТВОЯ_ССЫЛКА_NGROK.ngrok-free.dev"; 
    
    let store = { products: [], promos: {}, bot_username: "" };
    let cart = [];
    let currentCategory = 'Все';
    let activePromoDiscount = 0;

    async function init() {
        tg.expand();
        const user = tg.initDataUnsafe.user;
        document.getElementById('tg-user').innerText = user?.username || user?.first_name || "Client";
        
        try {
            const res = await fetch(`${API_URL}/api/init/${user?.id || 1551063019}`, { headers: {"ngrok-skip-browser-warning": "true"} });
            store = await res.json();
            
            document.getElementById('client-status').innerText = store.user.status;
            document.getElementById('total-spent').innerText = `${store.user.total_spent} ₴`;
            renderStore();
        } catch(e) { tg.showAlert("Ошибка подключения к серверу"); }
    }

    function switchTab(id, el) {
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${id}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        if(id === 'wishlist') renderWishlist();
        if(id === 'cart') renderCart();
    }

    function filterCat(cat, el) {
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        currentCategory = cat;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        renderStore();
    }

    function renderStore() {
        const prods = currentCategory === 'Все' ? store.products : store.products.filter(p => p.category === currentCategory);
        document.getElementById('catalog-grid').innerHTML = prods.map(createCard).join('');
    }

    function renderWishlist() {
        const liked = store.products.filter(p => p.is_liked);
        document.getElementById('wishlist-grid').innerHTML = liked.length ? liked.map(createCard).join('') : '<div style="grid-column: span 2; text-align:center; padding: 20px; color: var(--text-gray);">Пусто</div>';
    }

    function createCard(p) {
        // Мы берем прямую ссылку ImgBB прямо из базы (первую до запятой)
        const img = p.image_ids ? p.image_ids.split(',')[0] : "https://via.placeholder.com/300";
        const badge = p.badge ? `<div class="badge">${p.badge}</div>` : '';
        return `
            <div class="product-card" onclick="openModal(${p.id})">
                ${badge}
                <div class="heart ${p.is_liked ? 'active' : ''}" onclick="event.stopPropagation(); toggleLike(${p.id}, this)">❤</div>
                <img src="${img}" class="product-img">
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.price} ₴</div>
            </div>
        `;
    }

    function openModal(pid) {
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        const p = store.products.find(x => x.id === pid);
        // Массив всех ссылок с ImgBB
        const images = p.image_ids ? p.image_ids.split(',') : [];
        const galleryHtml = images.map(url => `<img src="${url}">`).join('');
        
        document.getElementById('modal-gallery').innerHTML = galleryHtml || '<img src="https://via.placeholder.com/400">';
        document.getElementById('modal-title').innerText = p.name;
        document.getElementById('modal-price').innerText = `${p.price} ₴`;
        document.getElementById('modal-desc').innerText = p.description || "Описание отсутствует";
        
        const badgeEl = document.getElementById('modal-badge');
        if(p.badge) { badgeEl.style.display = 'inline-block'; badgeEl.innerText = p.badge; }
        else { badgeEl.style.display = 'none'; }

        document.getElementById('modal-add-btn').onclick = () => { addToCart(p); closeModal(); };
        document.getElementById('modal-share-btn').onclick = () => {
            const link = `https://t.me/${store.bot_username}?start=item_${p.id}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Смотри какую вещь нашла в Vesto Bayer!`);
        };

        document.getElementById('product-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

    async function toggleLike(pid, el) {
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        const p = store.products.find(x => x.id === pid);
        p.is_liked = !p.is_liked;
        el.classList.toggle('active');
        fetch(`${API_URL}/api/like`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user_id: tg.initDataUnsafe.user?.id || 1551063019, product_id: pid})
        });
    }

    function addToCart(p) { 
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        cart.push(p); 
        tg.showAlert("✅ Товар добавлен в корзину!"); 
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const totalBox = document.getElementById('cart-total-box');
        if(cart.length === 0) { list.innerHTML = "<div style='text-align:center; padding:20px; color:var(--text-gray);'>Корзина пуста</div>"; totalBox.style.display = "none"; return; }

        list.innerHTML = cart.map((p, i) => `<div style="display:flex; gap:15px; margin-bottom:10px; background:white; padding:15px; border-radius:20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
            <div style="flex-grow:1; font-weight:700;">${p.name} <br><span style="color:var(--accent); font-size:16px;">${p.price} ₴</span></div>
            <div onclick="cart.splice(${i},1); renderCart()" style="color:#FF4B4B; font-size:24px; display:flex; align-items:center;">×</div>
        </div>`).join('');
        
        totalBox.style.display = "block";
        updateTotal();
    }

    function applyPromo() {
        const code = document.getElementById('promo-input').value.toUpperCase();
        if(store.promos[code]) {
            activePromoDiscount = store.promos[code];
            tg.showAlert(`✅ Промокод применен! Скидка ${activePromoDiscount}%`);
            updateTotal();
        } else { tg.showAlert("❌ Неверный или истекший промокод"); }
    }

    function updateTotal() {
        let sum = cart.reduce((a, b) => a + b.price, 0);
        let final = sum - (sum * (activePromoDiscount / 100));
        document.getElementById('cart-total-price').innerText = `${Math.round(final)} ₴`;
    }

    function shareWishlist() {
        const link = `https://t.me/${store.bot_username}?start=wishlist_${tg.initDataUnsafe.user?.id}`;
        if(tg.shareToStory) {
            tg.shareToStory("https://via.placeholder.com/1080x1920.png?text=My+Wishlist+Vesto", {text: "Смотри мой Wishlist в Vesto Bayer! " + link});
        } else {
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Мой Wishlist в Vesto Bayer!`);
        }
    }

    function sendOrder() {
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        let sum = cart.reduce((a, b) => a + b.price, 0);
        let final = Math.round(sum - (sum * (activePromoDiscount / 100)));
        tg.sendData(JSON.stringify({ type: 'order', items: cart.map(i=>i.name).join(', '), total: final, promo: document.getElementById('promo-input').value }));
        tg.close();
    }

    init();
</script>
</body>
</html>
