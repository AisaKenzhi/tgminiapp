<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vesto Bayer Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --accent: #007aff; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-bottom: 120px; }

        /* Галерея изображений */
        .gallery { display: flex; overflow-x: auto; gap: 10px; scroll-snap-type: x mandatory; margin-bottom: 15px; scrollbar-width: none; }
        .gallery img { flex: 0 0 100%; height: 250px; object-fit: cover; border-radius: 24px; scroll-snap-align: start; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* Таймлайн заказа */
        .timeline { border-left: 2px solid var(--accent); margin-left: 10px; padding-left: 20px; }
        .timeline-item { position: relative; margin-bottom: 20px; font-size: 13px; }
        .timeline-item::before { content: ''; position: absolute; left: -27px; top: 3px; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }

        /* Bento блоки */
        .bento-card { background: var(--card); border-radius: 28px; padding: 20px; box-shadow: 10px 10px 20px #d1d9e6, -10px -10px 20px #ffffff; margin-bottom: 20px; }

        /* Кнопки стилиста */
        .stylist-btn { border: 2px solid var(--accent); background: none; color: var(--accent); padding: 12px; border-radius: 18px; width: 100%; font-weight: 700; margin-top: 10px; }

        /* Режим сна */
        .sleep-banner { background: #ff9500; color: white; padding: 10px; border-radius: 15px; font-size: 12px; text-align: center; margin-bottom: 20px; display: none; }

        /* Анимация Успеха */
        .success-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .checkmark { width: 100px; height: 100px; border-radius: 50%; display: block; stroke-width: 2; stroke: var(--success); stroke-miterlimit: 10; box-shadow: inset 0px 0px 0px var(--success); animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both; }

        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 50px var(--success); } }
    </style>
</head>
<body>

    <div id="sleep-banner" class="sleep-banner">🌙 Мы отдыхаем, но вы можете оставить заявку — ответим утром!</div>

    <div class="bento-card" id="timeline-box" style="display:none;">
        <h4 style="margin:0 0 15px 0;">Статус заказа №<span id="order-num"></span></h4>
        <div class="timeline" id="timeline-list">
            </div>
    </div>

    <div id="catalog-grid">
        </div>

    <div class="success-overlay" id="success-anim">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
            <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
        <h2 style="color:var(--success); margin-top:20px;">Готово!</h2>
        <p>Менеджер уже спешит к вам</p>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const API = "https://unpendant-meteorically-felipe.ngrok-free.dev ";

    async function init() {
        const uid = tg.initDataUnsafe.user?.id || 1551063019;
        const res = await fetch(`${API}/api/init/${uid}`);
        const data = await res.json();
        
        // Рабочие часы
        if(!data.is_open) document.getElementById('sleep-banner').style.display = 'block';

        // Рендер таймлайна, если есть заказы
        if(data.history.length > 0) {
            document.getElementById('timeline-box').style.display = 'block';
            document.getElementById('order-num').innerText = data.history[0].id;
            const stages = ['Заявка принята', 'Стилист подбирает размер', 'Ожидание оплаты', 'Отправлено'];
            document.getElementById('timeline-list').innerHTML = stages.map(s => `<div class="timeline-item">${s}</div>`).join('');
        }

        // Рендер каталога с галереей
        const grid = document.getElementById('catalog-grid');
        grid.innerHTML = data.products.map(p => `
            <div class="bento-card">
                <div class="gallery">
                    <img src="https://via.placeholder.com/300">
                    <img src="https://via.placeholder.com/300">
                </div>
                <h3>${p.name}</h3>
                <div style="font-size:24px; font-weight:800; color:var(--accent);">${p.price} ₴</div>
                <button class="stylist-btn" onclick="sendRequest('help', ${p.id})">💡 Помощь стилиста</button>
                <button onclick="sendRequest('order', ${p.id})" style="width:100%; background:var(--accent); color:white; border:none; padding:15px; border-radius:18px; margin-top:10px; font-weight:700;">🛍 Заказать</button>
            </div>
        `).join('');
    }

    async function sendRequest(type, pid) {
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
        
        // Показ анимации успеха
        document.getElementById('success-anim').style.display = 'flex';
        
        const payload = {
            type: type,
            items: pid,
            customer: { name: tg.initDataUnsafe.user?.first_name, phone: "+380..." },
            total: 1200
        };
        
        tg.sendData(JSON.stringify(payload));
        
        setTimeout(() => {
            document.getElementById('success-anim').style.display = 'none';
        }, 3000);
    }

    init();
</script>
</body>
</html>
